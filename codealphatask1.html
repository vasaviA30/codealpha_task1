<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple E-commerce Store</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-size: 20px;
            margin-bottom: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #cart {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #cart ul {
            list-style: none;
            margin-top: 10px;
        }

        #cart ul li {
            padding: 5px 0;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Simple E-commerce Store</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#cart">Cart</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <div class="container">

        <h2>Products</h2>

        <div class="products">

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="Product">
                <h3>Wireless Headphones</h3>
                <p class="price">₹1499</p>
                <button onclick="addToCart('Wireless Headphones',1499)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="Product">
                <h3>Smart Watch</h3>
                <p class="price">₹2499</p>
                <button onclick="addToCart('Smart Watch',2499)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="Product">
                <h3>Bluetooth Speaker</h3>
                <p class="price">₹999</p>
                <button onclick="addToCart('Bluetooth Speaker',999)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="Product">
                <h3>Laptop Bag</h3>
                <p class="price">₹799</p>
                <button onclick="addToCart('Laptop Bag',799)">Add to Cart</button>
            </div>

        </div>

        <div id="cart">
            <h2>Shopping Cart</h2>

            <ul id="cart-items"></ul>

            <h3>Total: ₹<span id="total">0</span></h3>
        </div>

    </div>

    <footer>
        <p>© 2026 Simple E-commerce Store | CodeAlpha Internship Project</p>
    </footer>

    <script>
        let total = 0;

        function addToCart(product, price) {
            const cartItems = document.getElementById('cart-items');

            const li = document.createElement('li');
            li.textContent = product + ' - ₹' + price;

            cartItems.appendChild(li);

            total += price;

            document.getElementById('total').textContent = total;

            alert(product + ' added to cart');
        }
    </script>

</body>
</html>
